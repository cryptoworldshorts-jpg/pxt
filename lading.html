<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phoenix Token - Pre Sale</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1e22;
            color: #ffffff;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 50px 20px;
        }

        h1 { color: #ffffff; font-size: 40px; margin-bottom: 5px; }
        h2 { color: #ff5e00; margin-top: 0; font-size: 28px; }

        /* Novi Grid sistem: 3 u redu, pa 2 ispod */
        .price-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 jednaka stupca */
            gap: 20px;
            margin: 40px auto;
            max-width: 900px;
        }

        /* Osiguravamo da posljednja dva elementa popune prostor u drugom redu */
        .card:nth-child(4), 
        .card:nth-child(5) {
            grid-column: span 1; /* Ovo je default, ali čisto da znaš logiku */
        }

        .card {
            border: 1px solid #ff5e00;
            padding: 25px;
            border-radius: 10px;
            background-color: #252a30;
            transition: 0.3s;
        }

        .card:hover { transform: scale(1.03); border-color: #ff8c00; }
        .card h3 { color: #ff5e00; margin-top: 0; font-size: 22px; }

        /* Dugme */
        .reg-btn {
            background-color: #ff5e00;
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 22px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-top: 30px;
        }

        .reg-btn:hover { background-color: #e05200; }

        /* Socijalne mreže */
        .socials { margin-top: 50px; }
        .socials a { color: #ff5e00; margin: 0 15px; text-decoration: none; font-size: 18px; }

        /* Responsivnost za mobitel */
        @media (max-width: 768px) {
            .price-grid { grid-template-columns: 1fr; } /* Na mobitelu sve ide jedno ispod drugog */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Phoenix Token</h1>
        <h2>Pre Sale</h2>

        <div class="price-grid">
            <div class="card"><h3>500,000 PXT</h3><p>50 USD</p></div>
            <div class="card"><h3>1,000,000 PXT</h3><p>100 USD</p></div>
            <div class="card"><h3>2,000,000 PXT</h3><p>200 USD</p></div>
            <div class="card"><h3>5,000,000 PXT</h3><p>500 USD</p></div>
            <div class="card"><h3>10,000,000 PXT</h3><p>1,000 USD</p></div>
        </div>

        <a href="#" class="reg-btn">REGISTRUJ SE ZA PRE-SALE</a>

        <div class="socials">
            <p>Pridruži se zajednici:</p>
            <a href="#">Telegram</a>
            <a href="#">Twitter</a>
        </div>
    </div>

</body>
</html>
